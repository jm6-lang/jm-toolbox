name: Deploy to WeChat Mini Program

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci locally
        run: npm install miniprogram-ci

      - name: Write upload script
        run: |
          cat > upload.js << 'JSEOF'
          const { upload } = require('miniprogram-ci');
          const fs = require('fs');
          const key = fs.readFileSync('/tmp/private.key', 'utf8');
          console.log('Key loaded, length:', key.length);
          console.log('Key starts with:', key.substring(0, 30));
          
          upload({
            appid: 'wx92d88f2ddf8bad27',
            privateKey: key,
            projectPath: '.',
            version: process.argv[2] || '1.0.0',
            desc: process.argv[3] || 'Auto deploy',
            type: 'miniProgram',
          }).then(r => {
            console.log('SUCCESS:', JSON.stringify(r, null, 2));
          }).catch(err => {
            console.error('ERROR:', err.message);
            console.error('DETAILS:', err.stack);
            process.exit(1);
          });
          JSEOF
          echo "Script created"

      - name: Write private key
        env:
          PRIVATE_KEY: ${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$PRIVATE_KEY" > /tmp/private.key
          chmod 600 /tmp/private.key
          wc -c /tmp/private.key

      - name: Run upload via JS API
        run: |
          echo "=== Help info ==="
          node node_modules/miniprogram-ci/bin/miniprogram-ci.js --help 2>&1 | head -30 || echo "No help available"
          
          echo "=== Running upload ==="
          node upload.js 1.0.${{ github.run_number }} "Auto deploy via GitHub Actions"
