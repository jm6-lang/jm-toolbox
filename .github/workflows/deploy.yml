name: Deploy to WeChat Mini Program

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Deploy to WeChat Mini Program
        run: |
          echo "${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }}" > /tmp/private.key
          npx miniprogram-ci \
            --appid wx92d88f2ddf8bad27 \
            --private-key /tmp/private.key \
            --project ${{ github.workspace }} \
            --version 1.0.${{ github.run_number }} \
            --desc 'Auto deploy via GitHub Actions'
