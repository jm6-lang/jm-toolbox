name: Deploy to WeChat Mini Program

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload and Preview
        uses: mqcmd196/miniprogram-ci-action@v1
        with:
          type: preview
          appid: wx92d88f2ddf8bad27
          privatekey: ${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }}
          projectpath: ./
          version: 1.0.${{ github.run_number }}
          desc: 'Auto deploy via GitHub Actions'
