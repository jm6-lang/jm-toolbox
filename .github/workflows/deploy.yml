name: Deploy to WeChat Mini Program

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Upload to WeChat Mini Program
        uses: actions/upload-artifact@v4
        with:
          name: miniprogram-package
          path: ./
        env:
          MINIPROGRAM_APPID: wx92d88f2ddf8bad27
          MINIPROGRAM_PRIVATE_KEY: ${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }}

      - name: Deploy
        run: |
          npx miniprogram-ci \
            --appid wx92d88f2ddf8bad27 \
            --private-key ${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }} \
            --project ./ \
            --version 1.0.${{ github.run_number }} \
            --desc 'Auto deploy via GitHub Actions'
