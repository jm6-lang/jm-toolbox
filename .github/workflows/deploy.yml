name: Deploy to WeChat Mini Program

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install miniprogram-ci locally
        run: npm install miniprogram-ci

      - name: Write private key
        env:
          PRIVATE_KEY: ${{ secrets.MINIPROGRAM_UPLOAD_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$PRIVATE_KEY" > /tmp/private.key
          chmod 600 /tmp/private.key
          echo "Key written: $(wc -c < /tmp/private.key) bytes"

      - name: Upload via JS API
        run: |
          node - << 'EOF'
          const { upload, Project } = require('miniprogram-ci');
          const path = require('path');
          const fs = require('fs');

          const privateKey = fs.readFileSync('/tmp/private.key', 'utf8');
          const projectPath = process.cwd();
          const version = '1.0.' + (process.env.GITHUB_RUN_NUMBER || '0');
          const desc = 'Auto deploy via GitHub Actions';

          console.log('Project path:', projectPath);
          console.log('Version:', version);

          const project = new Project({
            appid: 'wx92d88f2ddf8bad27',
            type: 'miniProgram',
            projectPath: projectPath,
            privateKey: privateKey,
            ignores: ['node_modules/**/*'],
          });

          upload({
            project,
            version,
            desc,
          }).then(result => {
            console.log('✅ Upload SUCCESS:', JSON.stringify(result, null, 2));
          }).catch(err => {
            console.error('❌ Upload FAILED:', err.message);
            if (err.response) console.error('Response:', err.response.data);
            process.exit(1);
          });
          EOF
